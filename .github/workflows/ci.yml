name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-format-test:
    name: lint-format-test
    runs-on: ubuntu-latest
    env:
      LINT_CMD: ${{ vars.LINT_CMD }}
      FORMAT_CHECK_CMD: ${{ vars.FORMAT_CHECK_CMD }}
      TEST_CMD: ${{ vars.TEST_CMD }}
      CGO_ENABLED: ${{ vars.CGO_ENABLED }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check OS
        run: cat /etc/os-release

      - name: Install gcc
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $HOME/.local/bin v1.64.8
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run lint
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${LINT_CMD:-}" ]; then
            LINT_CMD='golangci-lint run ./...'
          fi
          eval "$LINT_CMD"

      - name: Run format check
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${FORMAT_CHECK_CMD:-}" ]; then
            FORMAT_CHECK_CMD='test -z "$(gofmt -l .)"'
          fi
          eval "$FORMAT_CHECK_CMD"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TEST_CMD:-}" ]; then
            TEST_CMD='go test ./... -race -cover'
          fi
          eval "$TEST_CMD"
